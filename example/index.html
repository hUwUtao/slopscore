<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wheatbreeze Example</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: #e9f6ff;
        color: #17324d;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 42px;
        line-height: 1.05;
      }

      p {
        max-width: 62ch;
        font-size: 18px;
        line-height: 1.55;
      }

      audio {
        width: 100%;
        margin: 22px 0;
      }

      ul {
        padding-left: 20px;
        line-height: 1.7;
      }

      a {
        color: #0f5f8f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Wheatbreeze</h1>
      <p>A small folk-classical example with reasoned score parts, generated ABC source, MusicXML, MIDI, and browser-friendly audio.</p>
      <audio controls preload="metadata">
        <source src="wheatbreeze.opus" type="audio/ogg; codecs=opus">
        <source src="wheatbreeze.mp3" type="audio/mpeg">
      </audio>
      <ul>
        <li><a href="wheatbreeze.abc">ABC source</a></li>
        <li><a href="wheatbreeze.musicxml">MusicXML</a></li>
        <li><a href="wheatbreeze.mid">MIDI</a></li>
        <li><a href="wheatbreeze.mp3">MP3</a></li>
        <li><a href="wheatbreeze.opus">Opus</a></li>
      </ul>
    </main>
  </body>
</html>
